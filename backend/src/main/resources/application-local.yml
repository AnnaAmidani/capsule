spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/capsule
    username: capsule
    password: capsule
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: openid,email,profile
          # Apple Sign In requires private_key_jwt client auth — full setup deferred to IaC spec
          # apple:
          #   client-id: ${APPLE_CLIENT_ID:placeholder}
          #   client-secret: ${APPLE_CLIENT_SECRET:placeholder}  # JWT signed with private key
          #   client-authentication-method: private_key_jwt
          #   scope: openid,email,name

aws:
  s3:
    bucket: capsule-local
    endpoint: http://localhost:9000

jwt:
  secret: local-dev-secret-at-least-32-chars-long!!

stripe:
  secret-key: sk_test_placeholder
  webhook-secret: whsec_placeholder

management:
  endpoint:
    health:
      show-details: always
